packages:
  - 'apps/*'
  - 'libs/*'
  - 'libs/prisma/*'

blockExoticSubdeps: false
nodeLinker: hoisted
autoInstallPeers: true
strictPeerDependencies: false

overrides:
  '@tiptap/core': $@tiptap/core
  '@tiptap/pm': $@tiptap/core
  '@tiptap/react': $@tiptap/react

allowBuilds:
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@sentry-internal/node-cpu-profiler': true
  '@sentry/cli': true
  '@swc/core': true
  core-js: false
  electron: true
  electron-winstaller: true
  esbuild: true
  less: false
  msgpackr-extract: true
  nx: true
  prisma: true
  sharp: true
  unrs-resolver: true
